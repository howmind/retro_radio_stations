name: Weekly Radio Data

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday 02:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Run script
        run: dart run scripts/dump.dart
        continue-on-error: false

      - name: Show dump files
        run: ls -lah assets/radio/

      - name: Verify zip exists
        run: |
          if [ ! -f assets/radio/radiostations.json.zip ]; then
            echo "ZIP file missing - build failed"
            exit 1
          fi

      - name: Generate SHA256 checksum
        run: |
          sha256sum assets/radio/radiostations.json.zip > assets/radio/radiostations.json.zip.sha256

      # Create tag based on date
      - name: Generate tag
        id: tag
        run: echo "tag=radio-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # delete the old and keep only latest release (avoid clutter)
      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Radio Data ${{ steps.tag.outputs.tag }}
          files: assets/radio/radiostations.json.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
